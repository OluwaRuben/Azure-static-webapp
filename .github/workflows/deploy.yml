name: Deploy Space Website to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Display files being deployed
      run: |
        echo "📁 Files to deploy:"
        ls -la
        echo "✅ Found $(ls *.html | wc -l) HTML files"
        echo "✅ Found $(ls *.css | wc -l) CSS files"
        echo "✅ Found $(ls *.js | wc -l) JS files"
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Storage
      run: |
        # Generate unique names
        TIMESTAMP=$(date +%s)
        RG_NAME="SpaceWebsite-GitHub-$TIMESTAMP"
        STORAGE_NAME="spacewebgh${{ github.run_id }}${{ github.run_number }}"
        STORAGE_NAME=$(echo "$STORAGE_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
        STORAGE_NAME="${STORAGE_NAME:0:24}"
        
        echo "🚀 Starting deployment..."
        echo "Resource Group: $RG_NAME"
        echo "Storage Account: $STORAGE_NAME"
        
        # Create resource group
        echo "📦 Creating resource group..."
        az group create --name $RG_NAME --location eastus
        
        # Create storage account
        echo "🏗️  Creating storage account..."
        az storage account create \
          --name $STORAGE_NAME \
          --resource-group $RG_NAME \
          --location eastus \
          --sku Standard_LRS \
          --kind StorageV2 \
          --allow-blob-public-access true
        
        # Enable static website
        echo "🌐 Enabling static website..."
        az storage blob service-properties update \
          --account-name $STORAGE_NAME \
          --static-website \
          --index-document index.html \
          --404-document 404.html
        
        # Upload files
        echo "📤 Uploading files to space..."
        az storage blob upload-batch \
          --account-name $STORAGE_NAME \
          --source . \
          --destination \$web \
          --overwrite \
          --pattern "*.*"
        
        # Get URL
        URL=$(az storage account show \
          --name $STORAGE_NAME \
          --resource-group $RG_NAME \
          --query "primaryEndpoints.web" \
          --output tsv)
        
        echo "✅ DEPLOYMENT COMPLETE!"
        echo "WEBSITE_URL=$URL" >> $GITHUB_ENV
        
    - name: Verify Deployment
      run: |
        echo "Testing website: ${{ env.WEBSITE_URL }}"
        sleep 10
        curl -I ${{ env.WEBSITE_URL }}
        
    - name: Display Success Message
      run: |
        echo "╔════════════════════════════════════════╗"
        echo "║  🎉 DEPLOYMENT SUCCESSFUL!             ║"
        echo "╚════════════════════════════════════════╝"
        echo "🌍 Your space website is live at:"
        echo "${{ env.WEBSITE_URL }}"
        echo ""
        echo "📸 Take a screenshot of this URL for your deliverable!"