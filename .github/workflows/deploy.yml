name: Deploy Space Website to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-to-azure:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Updated to v4
    
    - name: Azure Login
      uses: azure/login@v2  # Updated to v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Storage
      run: |
        # Generate unique names
        TIMESTAMP=$(date +%s)
        RG_NAME="SpaceWebsite-GitHub-$TIMESTAMP"
        STORAGE_NAME="spacewebgh${{ github.run_id }}${{ github.run_number }}"
        STORAGE_NAME=$(echo "$STORAGE_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
        STORAGE_NAME="${STORAGE_NAME:0:24}"
        
        echo "🚀 Starting deployment..."
        echo "Resource Group: $RG_NAME"
        echo "Storage Account: $STORAGE_NAME"
        
        # Create resource group
        az group create --name $RG_NAME --location eastus
        
        # Create storage account
        az storage account create \
          --name $STORAGE_NAME \
          --resource-group $RG_NAME \
          --location eastus \
          --sku Standard_LRS \
          --kind StorageV2 \
          --allow-blob-public-access true
        
        # Enable static website
        az storage blob service-properties update \
          --account-name $STORAGE_NAME \
          --static-website \
          --index-document index.html \
          --404-document 404.html
        
        # Upload files
        az storage blob upload-batch \
          --account-name $STORAGE_NAME \
          --source . \
          --destination \$web \
          --overwrite \
          --pattern "*.*"
        
        # Get URL
        URL=$(az storage account show \
          --name $STORAGE_NAME \
          --resource-group $RG_NAME \
          --query "primaryEndpoints.web" \
          --output tsv)
        
        echo "✅ DEPLOYMENT COMPLETE!"
        echo "WEBSITE_URL=$URL" >> $GITHUB_ENV
        
    - name: Verify Deployment
      run: |
        echo "Testing website: ${{ env.WEBSITE_URL }}"
        sleep 10
        curl -I ${{ env.WEBSITE_URL }} || echo "Website is still propagating, check URL manually: ${{ env.WEBSITE_URL }}"